<div class="page-wrapper">

  <div class="top-bar">

    <div class="left-section">
      <button routerLink="/classrooms" class="back-btn">
        ← Retour
      </button>
    </div>

    <div class="center-section">
      <div class="class-course-line" *ngIf="classroom">
        <span class="class-name">
          {{ classroom.nom }}
        </span>

        <span class="separator">:</span>

        <button (click)="prevCourse()" class="nav-btn">◀</button>

        <span class="course-date">
          {{ courseDate | date:'dd/MM/yyyy' }}
        </span>

        <button (click)="nextCourse()" class="nav-btn">▶</button>
      </div>
    </div>

    <div class="actions">
      <button [routerLink]="['/classrooms', classroom?.id, 'groupes']">Groupes</button>
      <button [routerLink]="['/classrooms', classroom?.id, 'roulette']">Tirage</button>
      <button [routerLink]="['/classrooms', classroom?.id, 'zone']">Zone sonore</button>
    </div>

  </div>

  <div class="mode-selector">

    <div class="mode-left">

      <button
        class="lock-toggle"
        [class.locked]="interactionMode === 'student'"
        [class.unlocked]="interactionMode === 'table'"
        (click)="toggleLock()">

        {{ interactionMode === 'student'
            ? 'Tables verrouillées'
            : 'Tables déverrouillées' }}

      </button>

      <div class="table-modes" *ngIf="interactionMode === 'table'">

        <div class="grid-control-inline">
          <label>Colonnes</label>
          <input type="number" [(ngModel)]="tempCols" min="1">
        </div>

        <div class="grid-control-inline">
          <label>Lignes</label>
          <input type="number" [(ngModel)]="tempRows" min="1">
        </div>

        <button (click)="applyGrid()" class="apply-btn">
          Appliquer
        </button>

      </div>

    </div>

    <div class="mode-right">
      <button
        class="secondary-btn"
        (click)="toggleSidebar()">
        {{ sidebarVisible ? 'Masquer les informations' : 'Afficher les informations' }}
      </button>
    </div>

  </div>

  <div class="layout" *ngIf="classroom?.uiTables">

    <div class="plan-column">
      <app-plan
        [tables]="classroom.uiTables"
        [interactionMode]="interactionMode"
        [tableSize]="tableSize"
        [cols]="cols"
        [rows]="rows"
        (studentClicked)="selectStudent($event)"
        (tableMoved)="saveClassroom()"
        (studentsSwapped)="onStudentsSwapped($event)">
      </app-plan>
    </div>

    <div class="right-column" *ngIf="sidebarVisible">

      <div class="top-actions">

        <button
          class="action-btn secondary"
          (click)="toggleStudentsList()">
          Liste des élèves
        </button>

        <button
          class="action-btn primary"
          [disabled]="interactionMode === 'table'"
          (click)="addStudentDirect()">
          Ajouter un élève
        </button>

        <button
          class="action-btn success"
          (click)="addDevoir()">
          Ajouter un devoir
        </button>

      </div>

      <app-sidebar
        *ngIf="showStudentsList"
        [tables]="classroom.uiTables"
        [disabled]="interactionMode !== 'student'"
        (studentSelected)="selectStudent($event)">
      </app-sidebar>

      <app-student-detail
        *ngIf="selectedStudent"
        [student]="selectedStudent"
        [classRoomId]="classroom?.id"
        [courseDate]="courseDate"
        [devoirs]="devoirs"
        (studentDeleted)="onStudentDeleted($event)"
        (remarksChanged)="onRemarksChanged()">
      </app-student-detail>

      <app-remark-filter
        [eleves]="getAllStudents()">
      </app-remark-filter>

    </div>

  </div>

</div>
