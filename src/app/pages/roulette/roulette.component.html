<div class="roulette-container">

	<!-- Retour au plan -->
	<button class="back-button"(click)="goBack()">
		← Retour au plan
	</button>

	<h1 class="title">Tirage au sort</h1>

	<div class="wheel-wrapper">

		<!-- Pointeur -->
		<div class="pointer"></div>

		<!-- Roue -->
		<div class="wheel"[class.spinning]="spinning">

			<!-- Élève sélectionné -->
			<div class="student-display"*ngIf="selectedStudent;else placeholder">
				{{selectedStudent.prenom}} {{selectedStudent.nom}}
			</div>

			<!-- Message par défaut -->
			<ng-template #placeholder>
				<div class="placeholder">
					Cliquez sur "Lancer la roulette"
				</div>
			</ng-template>

		</div>

	</div>

	<!-- Bouton lancement -->
	<button class="spin-button"
	(click)="spin()"
	[disabled]="spinning">
		🎡 Lancer la roulette
	</button>

</div>
