<div class="remark-filter">

	<div class="filter-title">
		Filtrer les remarques
	</div>

	<input
		type="text"
		[(ngModel)]="filterText"
		placeholder="Rechercher une remarque...">

	<div *ngIf="filterText.trim()" class="filter-results">

		<div *ngIf="filtered.length===0" class="no-result">
			Aucun résultat
		</div>

		<div *ngFor="let item of filtered" class="filter-student">

			<div class="student-name">
				{{item.eleve.prenom}} {{item.eleve.nom}}
			</div>

			<div
				class="remark-line"
				*ngFor="let r of item.remarques">

				• {{clean(r.intitule)}}

			</div>

		</div>

	</div>

</div>
